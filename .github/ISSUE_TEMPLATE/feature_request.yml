name: Feature request
description: Suggest an idea or improvement — app, bridge, or anything Rein.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Tell us the problem first — that helps us find the
        best solution, which might not be the one you had in mind.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      placeholder: Describe the feature or change you'd like.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Anything else?
      description: Alternatives you've considered, screenshots, mockups, context.
    validations:
      required: false
