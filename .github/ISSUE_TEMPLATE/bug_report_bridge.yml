name: Bug report — bridge / CLI
description: Something in the rein bridge daemon or the `rein` CLI isn't working right.
title: "[Bridge bug]: "
labels: ["bug", "bridge"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you give,
        the faster we can reproduce and fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead?
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen again?
      placeholder: |
        1. Run ...
        2. Then ...
        3. See ...
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "`rein version`, how you installed (curl / npm / brew), OS + arch."
      render: text
      placeholder: |
        rein 0.1.0 (installed via curl)
        macOS 15.5 arm64
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: The tail of `~/.reins/bridge.log` (or `rein logs --tail 100`). Never paste tokens or transcript contents.
      render: text
    validations:
      required: false
