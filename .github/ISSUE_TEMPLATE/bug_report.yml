name: Bug report
description: Something in the Rein mobile app isn't working right.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you give,
        the faster we can reproduce and fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead?
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen again?
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See ...
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Filled in automatically when you report from the app. No need to edit.
      render: text
    validations:
      required: false
